[project]
name = "emma"
version = "0.1.0"
description = "Emma - bilingual voice-activated AI assistant for macOS"
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "Garcia" }]
dependencies = [
    "openwakeword>=0.6.0",
    "openai>=1.50.0",
    "elevenlabs>=1.0.0",
    "playwright>=1.40.0",
    "sounddevice>=0.4.6",
    "numpy>=1.26.0",
    "pydantic>=2.5.0",
    "pydantic-settings>=2.1.0",
    "structlog>=24.0.0",
    "httpx>=0.27.0",
    "psycopg[binary]>=3.1.0",
    "aiosqlite>=0.20.0",
    "python-dotenv>=1.0.0",
    "spotipy>=2.23.0",
    "trafilatura>=1.12.0",
    "ai-edge-litert>=2.1.5",
    "tensorflow>=2.21.0",
    "websockets>=12.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "mypy>=1.8.0",
    "ruff>=0.5.0",
]

[tool.uv]
package = false
