# Acceptance scenarios. JSON-formatted YAML so the runner can parse with
# stdlib `json` (no PyYAML dependency). The file is valid YAML either way.
#
# Schema per entry:
#   id, name, language ("es"|"en")
#   given            : human-readable precondition
#   utterance        : exact text to inject (mic + Whisper are bypassed)
#   expected_actions : list of { tool, args_contain } - each must appear,
#                      args_contain is a subset match on the tool's args
#   expected_spoken_pattern : regex matched against the assistant's full
#                      response text (case-insensitive, DOTALL)
#   mock_spoken_text : text the runner returns in --mock-external mode
#                      (chosen to satisfy expected_spoken_pattern)
#   max_latency_ms   : turn-duration budget (live mode only)
#   destructive      : informational
#   expects_phase    : optional, integer phase that must exist for this
#                      scenario to be valid in live mode. The runner
#                      treats unmet expectations as a labelled SKIP
#                      rather than a FAIL.
#   follows          : optional scenario id; run as a continuation,
#                      reusing the prior session/history
#   live_blocked_by  : optional one-line note about why live mode can't
#                      run this scenario in this environment

