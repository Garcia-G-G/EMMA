<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Emma · Atom</title>
<style>
:root {
  --void: #03070d;
  --ion: #5cf2ff;
  --ice: #b8fffa;
  --nucleus: #f7ffff;
  --fault: #ff6b6b;
  --energy: 0;
  --orbit-speed: 18s;
  --glow: .42;
}
* { box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
  background: var(--void);
  color: var(--ion);
  font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
}
body.idle { cursor: none; }
.emma-stage {
  position: fixed;
  inset: 0;
  display: grid;
  place-items: center;
  isolation: isolate;
  background:
    radial-gradient(circle at 50% 48%, rgba(92,242,255,.07), transparent 31%),
    linear-gradient(rgba(92,242,255,.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(92,242,255,.018) 1px, transparent 1px),
    var(--void);
  background-size: auto, 48px 48px, 48px 48px, auto;
}
.emma-stage::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  box-shadow: inset 0 0 180px rgba(0,0,0,.92);
}
.atom-shell {
  position: relative;
  width: min(70vmin, 620px);
  aspect-ratio: 1;
  display: grid;
  place-items: center;
}
.atom-shell::before,
.atom-shell::after {
  content: "";
  position: absolute;
  border: 1px solid rgba(92,242,255,.12);
  border-radius: 50%;
  inset: 8%;
}
.atom-shell::after {
  inset: 17%;
  border-style: dashed;
  opacity: .5;
  animation: calibrate 48s linear infinite;
}
.emma-atom {
  width: 86%;
  height: 86%;
  overflow: visible;
  filter: drop-shadow(0 0 calc(14px + 18px * var(--glow)) rgba(92,242,255,.28));
}
.atom-orbit {
  fill: none;
  stroke: var(--ion);
  stroke-width: 1.35;
  vector-effect: non-scaling-stroke;
  opacity: calc(.34 + var(--glow) * .48);
  transform-box: fill-box;
  transform-origin: center;
}
.orbit-a { animation: breathe 5.6s ease-in-out infinite; }
.orbit-b { animation: breathe 5.6s ease-in-out -1.8s infinite; }
.orbit-c { animation: breathe 5.6s ease-in-out -3.6s infinite; }
.atom-nucleus {
  fill: var(--nucleus);
  transform-box: fill-box;
  transform-origin: center;
  animation: nucleus 2.8s ease-in-out infinite;
  filter: drop-shadow(0 0 8px var(--ice)) drop-shadow(0 0 22px var(--ion));
}
.atom-electron {
  fill: var(--ice);
  transform-box: view-box;
  transform-origin: 160px 160px;
  filter: drop-shadow(0 0 5px var(--ion));
}
.electron-a { animation: electron-a var(--orbit-speed) linear infinite; }
.electron-b { animation: electron-b var(--orbit-speed) linear infinite; }
.electron-c { animation: electron-c var(--orbit-speed) linear infinite; }
.telemetry {
  position: absolute;
  z-index: 2;
  font-size: 9.5px;
  line-height: 1.6;
  letter-spacing: .2em;
  text-transform: uppercase;
  opacity: .68;
}
.telemetry strong { color: var(--ice); font-weight: 500; }
.telemetry small { display: block; font-size: 8.5px; opacity: .55; }
.top-left { top: 24px; left: 24px; }
.top-right { top: 24px; right: 24px; text-align: right; }
.bottom-left { bottom: 28px; left: 24px; }
.status {
  position: absolute;
  bottom: 27px;
  left: 50%;
  z-index: 2;
  transform: translateX(-50%);
  text-align: center;
}
.status-state {
  color: var(--nucleus);
  font-size: 12px;
  letter-spacing: .48em;
  text-shadow: 0 0 14px rgba(92,242,255,.55);
}
.status-meta {
  margin-top: 7px;
  font-size: 9px;
  letter-spacing: .25em;
  opacity: .52;
}
body[data-state="listening"] { --orbit-speed: 12s; --glow: .64; }
body[data-state="thinking"] { --orbit-speed: 7s; --glow: .82; }
body[data-state="speaking"] { --orbit-speed: 4.8s; --glow: 1; }
body[data-state="error"] { --ion: var(--fault); --ice: #ffd6d6; --orbit-speed: 3s; --glow: 1; }

@keyframes calibrate { to { transform: rotate(360deg); } }
@keyframes breathe {
  0%, 100% { opacity: calc(.3 + var(--glow) * .4); }
  50% { opacity: calc(.52 + var(--glow) * .46); }
}
@keyframes nucleus {
  0%, 100% { transform: scale(calc(1 + var(--energy) * .22)); }
  50% { transform: scale(calc(1.08 + var(--energy) * .34)); }
}
@keyframes electron-a { to { transform: rotate(360deg); } }
@keyframes electron-b { to { transform: rotate(360deg); } }
@keyframes electron-c { to { transform: rotate(-360deg); } }
@media (max-width: 620px) {
  .atom-shell { width: 92vmin; }
  .bottom-left { bottom: 72px; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 1ms !important; animation-iteration-count: 1 !important; }
}
</style>
<script>
window.__emma_painted = false;
document.addEventListener("DOMContentLoaded", function () { window.__emma_painted = true; });
</script>
</head>
<body data-state="waiting_for_wake">
<main class="emma-stage">
  <div class="telemetry top-left"><strong>Emma</strong> · atom<small>realtime voice system</small></div>
  <div class="telemetry top-right"><strong>LAT</strong> <span id="lat">— —</span><small>vad <span id="vad">0.75</span></small></div>
  <div class="telemetry bottom-left"><strong>LAST TOOL</strong><small id="last-tool">— —</small></div>

  <div class="atom-shell" aria-hidden="true">
    <svg class="emma-atom" viewBox="0 0 320 320">
      <g class="atom-orbits">
        <ellipse class="atom-orbit orbit-a" cx="160" cy="160" rx="118" ry="42"/>
        <ellipse class="atom-orbit orbit-b" cx="160" cy="160" rx="118" ry="42" transform="rotate(60 160 160)"/>
        <ellipse class="atom-orbit orbit-c" cx="160" cy="160" rx="118" ry="42" transform="rotate(120 160 160)"/>
      </g>
      <circle class="atom-nucleus" cx="160" cy="160" r="15"/>
      <circle class="atom-electron electron-a" cx="278" cy="160" r="5"/>
      <circle class="atom-electron electron-b" cx="101" cy="58" r="5"/>
      <circle class="atom-electron electron-c" cx="101" cy="262" r="5"/>
    </svg>
  </div>

  <div class="status">
    <div class="status-state" id="state">WAITING</div>
    <div class="status-meta"><span id="voice">coral · bilingual</span> · session <span id="clock">00:00</span></div>
  </div>
</main>
<script>
(function () {
  var STATES = {
    waiting_for_wake: "WAITING",
    listening: "LISTENING",
    thinking: "THINKING",
    speaking: "SPEAKING",
    error: "ERROR"
  };
  var sessionStart = null;
  var energy = 0;
  var targetEnergy = 0;

  function setState(name) {
    if (!STATES[name]) return;
    document.body.dataset.state = name;
    document.getElementById("state").textContent = STATES[name];
  }

  function animateEnergy() {
    energy += (targetEnergy - energy) * .16;
    document.documentElement.style.setProperty("--energy", energy.toFixed(3));
    requestAnimationFrame(animateEnergy);
  }
  animateEnergy();

  setInterval(function () {
    var clock = document.getElementById("clock");
    if (sessionStart === null) { clock.textContent = "00:00"; return; }
    var seconds = Math.floor((Date.now() - sessionStart) / 1000);
    clock.textContent = String(Math.floor(seconds / 60)).padStart(2, "0") + ":" +
      String(seconds % 60).padStart(2, "0");
  }, 250);

  var backoff = 1000;
  function connect() {
    var ws = new WebSocket("ws://" + window.location.hostname + ":3201/events");
    ws.onopen = function () { backoff = 1000; };
    ws.onmessage = function (event) {
      var message;
      try { message = JSON.parse(event.data); } catch (_) { return; }
      if (message.type === "init" && message.vad_threshold != null) {
        document.getElementById("vad").textContent = message.vad_threshold.toFixed(2);
      } else if (message.type === "state") {
        setState(message.state);
        if (message.state === "waiting_for_wake") sessionStart = null;
      } else if (message.type === "session_started") {
        sessionStart = Date.now();
      } else if (message.type === "session_ended") {
        sessionStart = null;
        targetEnergy = 0;
      } else if (message.type === "latency") {
        document.getElementById("lat").textContent =
          (message.wake_to_first_audio_ms / 1000).toFixed(2) + " s";
      } else if (message.type === "tool_completed") {
        document.getElementById("last-tool").textContent =
          message.name + " · " + message.elapsed_ms + " ms";
      } else if (message.type === "output_level") {
        targetEnergy = Math.max(0, Math.min(1, message.level));
      }
    };
    ws.onclose = function () {
      setTimeout(connect, backoff);
      backoff = Math.min(backoff * 2, 16000);
    };
    ws.onerror = function () { try { ws.close(); } catch (_) {} };
  }
  connect();

  var hideTimer;
  function revealCursor() {
    document.body.classList.remove("idle");
    clearTimeout(hideTimer);
    hideTimer = setTimeout(function () { document.body.classList.add("idle"); }, 3000);
  }
  ["mousemove", "mousedown", "keydown", "touchstart"].forEach(function (name) {
    window.addEventListener(name, revealCursor);
  });
  revealCursor();
})();
</script>
</body>
</html>
