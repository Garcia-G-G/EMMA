[mypy]
python_version = 3.11
plugins = pydantic.mypy
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
no_implicit_optional = True
ignore_missing_imports = True
# Tests use pytest fixtures/mocks that don't carry type info; strict typing
# there is noise, not signal. Source (core/tools/memory/config) stays strict.
exclude = (?x)(^tests/)

[mypy-tests.*]
ignore_errors = True

[mypy-core.*]
strict = True

[mypy-tools.*]
strict = True

[mypy-memory.*]
strict = True

[mypy-config.*]
strict = True
