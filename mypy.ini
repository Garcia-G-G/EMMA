[mypy]
python_version = 3.11
plugins = pydantic.mypy
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
no_implicit_optional = True
ignore_missing_imports = True

[mypy-core.*]
strict = True

[mypy-tools.*]
strict = True

[mypy-memory.*]
strict = True

[mypy-config.*]
strict = True
