[mypy]
python_version = 3.11
plugins = pydantic.mypy
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
no_implicit_optional = True
ignore_missing_imports = True
# Tests use pytest fixtures/mocks that don't carry type info; strict typing
# there is noise, not signal. Source (core/tools/memory/config) stays strict.
# Also skip throwaway smoke scripts and build output (py2app/pkg artifacts under
# dist/, build/), which are generated and not production code.
exclude = (?x)(^tests/|^scripts/|^dist/|^build/)

[mypy-tests.*]
ignore_errors = True

# The dashboard/visualizer is an opt-in dev server, not part of the assistant
# runtime contract; not strictly typed (same rationale as tests).
[mypy-dashboard.*]
ignore_errors = True

[mypy-core.*]
strict = True

[mypy-tools.*]
strict = True

[mypy-memory.*]
strict = True

[mypy-config.*]
strict = True
