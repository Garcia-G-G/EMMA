# Emma vocabulary library.
# - canonical: the official spelling Emma reads and writes.
# - stt_aliases: common mistranscriptions folded back to canonical.
# - say_es / say_en: optional phonetic spelling so Emma pronounces the
#   word correctly when speaking that language.
# - description: one-liner for the LLM's situational awareness.

[Claude]
canonical = "Claude"
description = "Anthropic's AI assistant; pronounced like English 'klohd'."
stt_aliases = ["clout", "cloud", "clod", "claudia", "klaud", "klauz"]
say_es = "clod"
say_en = "klohd"

[ClaudeCode]
canonical = "Claude Code"
description = "Anthropic's coding agent CLI."
stt_aliases = ["cloud code", "clout code", "claude codes"]
say_es = "clod cod"
say_en = "klohd code"

