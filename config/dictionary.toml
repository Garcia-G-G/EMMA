# Emma knowledge dictionary.
#
# Five sections, each a different kind of durable knowledge the user relies
# on daily. Entries are public-tier — no passwords, no full addresses, no
# phone numbers. Secrets live in the macOS Keychain via
# `tools/secrets_tool.remember_secret`.
#
# This file ships with generic placeholders. A fresh user teaches Emma their
# own facts by voice (the `remember_*` tools write back here); nothing personal
# is pre-seeded.
#
# Hot-reload: `python -m emma.dictionary reload`.

# -----------------------------------------------------------------------
# [user] — who "yo / mi / mío / mis" refers to. The user teaches Emma these
# by voice (remember_user_profile); empty defaults are intentional — Emma
# must not guess. Public-tier only; secrets stay in the Keychain.
# -----------------------------------------------------------------------
[user]
display_name = ""
full_name = ""
github_username = ""
linkedin = ""
website = ""
preferred_lang = "es"

# -----------------------------------------------------------------------
# [pages] — URL shortcuts. "Emma, abre mi <key>" → opens the url.
# Optional fields: open_in (browser bundle id), title.
# -----------------------------------------------------------------------
[pages.github]
url = "https://github.com/<your-username>"
title = "Mi GitHub"

[pages.github_inbox]
url = "https://github.com/notifications"
title = "GitHub notifications"

[pages.linear]
url = "https://linear.app/"
title = "Linear"

[pages.calendar]
url = "https://calendar.google.com/"
title = "Google Calendar"

# -----------------------------------------------------------------------
# [contacts] — people the user mentions by relation or first name.
# Used by mail/messages tools to resolve "manda mensaje a mi mamá".
# Public fields only: name, email, relation. NOT phone numbers.
# Added by voice via remember_contact.
#
# Example (delete or replace by voice with remember_contact):
# [contacts.mom]
# name = "Nombre Apellido"
# email = "correo@example.com"
# relation = "madre"
# aliases = ["mami", "mamá", "mom"]
# -----------------------------------------------------------------------

# -----------------------------------------------------------------------
# [terms] — glossary. Acronyms, project codenames, jargon.
# Stored as semantic memory facts so the LLM has them in priming.
# -----------------------------------------------------------------------
[terms.OWASP]
expansion = "Open Web Application Security Project"
context = "Seguridad web. Referencia estándar Top 10."

[terms.MCP]
expansion = "Model Context Protocol"
context = "Estándar de Anthropic para conectar LLMs a herramientas externas."

[terms.MVP]
expansion = "Minimum Viable Product"
context = "Producto mínimo viable — versión más pequeña que entrega valor."

# -----------------------------------------------------------------------
# [apps] — the user's preferred app per category (auto-detected; these are
# fallbacks for when detect_preferred can't pick). Routes voice intents
# directly without asking.
# -----------------------------------------------------------------------
[apps.editor]
default = "Cursor"

[apps.browser]
default = "Brave Browser"

[apps.terminal]
default = "iTerm"

[apps.music]
default = "Spotify"

# -----------------------------------------------------------------------
# [facts] — durable personal facts. Get seeded into memory so the LLM has
# them in every priming block. A fresh install has none — Emma learns them
# by voice (remember_fact / reflection) and appends them here.
# Each entry has `text` and optional `kind` and `confidence`.
# -----------------------------------------------------------------------
[facts]

# -----------------------------------------------------------------------
# [connections] — the user's in-app resources (19.6-B17): TablePlus
# connections, Slack channels, Obsidian notes. Each entry names the app,
# the resource kind (matches a resource_url template in
# app_capabilities.toml) and the fields the template needs. Added by
# voice via remember_connection. NO credentials here — TablePlus etc.
# keep those in their own Keychain entries.
# -----------------------------------------------------------------------

# -----------------------------------------------------------------------
# [user_apps] — per-user app config the capabilities registry can't know
# (workspace/team/vault IDs). Replace these placeholders with your real
# values. Used by tools/app_url_tool to build deep links.
# -----------------------------------------------------------------------
[user_apps.slack]
workspace = "<your-team-id>"
default_channel = "general"

[user_apps.linear]
team = "<your-team-key>"

[user_apps.obsidian]
default_vault = "Notas"

[terms.ELIMINAR]
expansion = "delete"
context = "Cuando el usuario diga 'eliminar' se interpreta como 'delete' (acción de borrar)."
