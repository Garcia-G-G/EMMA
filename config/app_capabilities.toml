# Emma app-capabilities registry.
#
# Maps each app Garcia uses to its automation mechanisms so a single set of
# tools can drive many apps — adding an app is a TOML block, not new code.
#
# Fields (all optional):
#   url_scheme        the scheme name without "://" (implies deep-linking).
#   applescript_dict  "full" | "limited" (a usable AppleScript dictionary).
#   cli               CLI binary name in PATH, if the app ships one.
#   category          chat|notes|tasks|design|dev|media|productivity|cloud.
#   notes             one-line human note.
#
# PUBLIC capability info only — NO per-user data (workspace/team/vault IDs).
# Those live in config/dictionary.toml [user_apps]. Hot-reload:
#   python -c "from core.app_capabilities import reload; print(reload())"

[slack]
url_scheme = "slack"
category = "chat"
notes = "Deep link: slack://channel?team=TEAM_ID&id=CHANNEL_ID (real IDs)."
# 19.6-B17: resource templates. Placeholders = keys from dictionary
# [user_apps.slack] (workspace) and/or [connections.*] entries (channel, user).
resource_url.channel = "slack://channel?team={workspace}&id={channel}"
resource_url.dm = "slack://user?team={workspace}&id={user}"

[discord]
url_scheme = "discord"
category = "chat"
notes = "Open a channel via the desktop app; POST messages via a per-channel webhook (Keychain). discord://-/channels/<server>/<channel>."
resource_url.channel = "discord://-/channels/{server_id}/{channel_id}"
resource_url.dm = "discord://-/channels/@me/{user_id}"

[whatsapp]
url_scheme = "whatsapp"
category = "chat"
notes = "wa.me opens the desktop app (or web) with the message prefilled; Garcia taps Send. Phone = digits only, no +/spaces."
resource_url.message = "whatsapp://send?phone={phone}&text={text}"
web_fallback.message = "https://wa.me/{phone}?text={text}"

# Prompt 26: X has NO native macOS app since Aug 2024, so twitter:// is dead on
# the Mac — the web intent composer is the reliable path (no auth to open).
[x]
url_scheme = ""
category = "social"
notes = "Web intent composer (browser, prefilled); Garcia taps Post. API posting needs an OAuth2 user-context token (paid/approved acct)."
web_fallback.post = "https://twitter.com/intent/tweet?text={text}"

# LinkedIn cannot reliably prefill arbitrary post TEXT via URL (verified 2026):
# share-offsite only attaches a link via Open Graph. We open the feed composer
# (best-effort text) AND copy the text to the clipboard so Garcia can paste.
[linkedin]
url_scheme = "linkedin"
category = "social"
notes = "Web composer; text prefill is best-effort (LinkedIn ignores URL text params), so Emma also copies the text to the clipboard."
resource_url.profile = "linkedin://in/{handle}"
web_fallback.post = "https://www.linkedin.com/feed/?shareActive=true&text={text}"

[figma]
url_scheme = "figma"
category = "design"
notes = "figma://file/<file-id>/<file-name>."

[linear]
url_scheme = "linear"
category = "dev"
notes = "linear://team/<team-id>/issue/<issue-id>."

[notion]
url_scheme = "notion"
category = "notes"
notes = "notion://www.notion.so/<workspace>/<page-id>."

[obsidian]
url_scheme = "obsidian"
category = "notes"
notes = "obsidian://open?vault=<vault>&file=<path>."
resource_url.note = "obsidian://open?vault={default_vault}&file={file}"

# TablePlus opens a SAVED connection by name; credentials stay in TablePlus's
# own Keychain entry — never in the URL (19.6-B17).
# Sources: docs.tableplus.com/gui-tools/manage-connections,
# github.com/TablePlus/TablePlus/issues/1593.
[tableplus]
url_scheme = "tableplus"
category = "dev"
notes = "tableplus://connect/<name> opens the saved connection by name."
resource_url.connection = "tableplus://connect/{name}"

[bear]
url_scheme = "bear"
applescript_dict = "full"
category = "notes"
notes = "bear://x-callback-url/create?title=&text=."

[things]
url_scheme = "things"
applescript_dict = "full"
category = "tasks"
notes = "things:///add?title=&notes= (three slashes)."

[todoist]
url_scheme = "todoist"
category = "tasks"
notes = "todoist://addtask?content=."

[github_desktop]
url_scheme = "x-github-client"
category = "dev"
notes = "GitHub Desktop: x-github-client://openRepo/<https-url>."

[postman]
url_scheme = "postman"
category = "dev"
notes = "Postman desktop deep links."

[vlc]
url_scheme = "vlc"
applescript_dict = "limited"
category = "media"
notes = "vlc://<path-or-url>."

[spotify]
url_scheme = "spotify"
applescript_dict = "full"
category = "media"
notes = "spotify:track:<id> / full AppleScript transport."

[apple_music]
applescript_dict = "full"
category = "media"
notes = "Apple Music — full AppleScript, no deep-link scheme used here."
