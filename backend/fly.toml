# Fly.io config for the Emma backend (Prompt 31, Part E). NOT deployed yet —
# `fly launch` / `fly deploy` once the account + secrets exist (see SETUP.md).
app = "emma-backend"
primary_region = "dfw"   # Dallas — nearest Fly region to Monterrey

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  PUBLIC_URL = "https://emma-backend.fly.dev"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1   # keep one warm so demo WebSockets connect instantly

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "30s"
    timeout = "5s"

# WebSocket relay holds long-lived connections; a single concurrent-heavy machine.
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
