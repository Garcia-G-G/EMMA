<!doctype html><html lang="es"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Emma — panel</title>
<meta name="theme-color" content="#0a0a0b">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3CradialGradient id='g' cx='34%25' cy='30%25' r='75%25'%3E%3Cstop offset='0%25' stop-color='%233a3a44'/%3E%3Cstop offset='48%25' stop-color='%2315151b'/%3E%3Cstop offset='100%25' stop-color='%230b0b0f'/%3E%3C/radialGradient%3E%3C/defs%3E%3Ccircle cx='16' cy='16' r='15' fill='url(%23g)'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="/static/tokens.css">
<style>
  main{max-width:880px;margin:0 auto;padding:56px 40px}
  .head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:30px}
  .plan-tag{font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.08em;
    color:var(--accent);border:1px solid var(--accent-q);padding:6px 13px;border-radius:999px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .panel{background:var(--bg-elev);border:1px solid var(--rule);border-radius:12px;padding:22px}
  .panel h2{font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);margin:0 0 12px;font-weight:500}
  .big{font-family:var(--font-display);font-size:32px;font-weight:600;letter-spacing:-.01em}
  .panel.span{grid-column:1/-1}
  .acts{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px}
  .cmp{margin-top:6px}
  .logout{margin-top:26px;font-family:var(--font-mono);font-size:12px;letter-spacing:.04em;color:var(--ink-soft)}
  @media(max-width:760px){main{padding:44px 22px}.grid{grid-template-columns:1fr}}
</style></head><body>
<nav class="site-nav"><div class="row">
  <a class="brand" href="https://theemmafamily.com"><span class="mk"></span>Emma</a>
  <div class="nav-right"><div class="nav-links"><a href="/plans">Planes</a><a href="/download">Descarga</a></div></div>
</div></nav>
<main>
  <div class="head"><h1>Hola, <span id="name">…</span></h1><span class="plan-tag" id="plan">…</span></div>
  <div class="grid">
    <div class="panel"><h2>Sesiones este mes</h2><div class="big" id="sessions">–</div></div>
    <div class="panel"><h2>Minutos usados</h2><div class="big" id="minutes">–</div></div>
  </div>
  <div class="panel span" style="margin-top:16px"><h2>Tu plan</h2>
    <div class="ink-soft" id="capdesc">…</div>
    <div class="acts">
      <button class="btn btn-primary" onclick="upgrade('pro');return false">Subir a Pro</button>
      <button class="btn btn-ghost" onclick="portal();return false">Cambiar plan</button>
    </div>
  </div>
  <div class="panel span" style="margin-top:16px"><h2>Descarga Emma</h2>
    <div class="acts">
      <a class="btn btn-primary" id="dlmac" href="#">Para Mac (.pkg)</a>
      <a class="btn btn-ghost" id="dlwin" href="#">Para Windows (.msi)</a>
    </div>
  </div>
  <div class="panel span" style="margin-top:16px"><h2>Tus sesiones</h2>
    <table class="cmp"><thead><tr><th>Inicio</th><th>Duración</th><th>Costo</th></tr></thead>
      <tbody id="rows"><tr><td colspan="3" class="ink-soft">…</td></tr></tbody></table>
  </div>
  <p class="logout"><a href="/auth/logout">Cerrar sesión</a></p>
</main>
<footer class="site-foot"><div class="row">
  <span>hecho por Garcia · Monterrey, MX · 2026</span>
  <span class="links"><a href="https://theemmafamily.com">portada</a><a href="/plans">precios</a><a href="/download">descarga</a></span>
</div></footer>
<script>
async function load(){
  const r=await fetch("/api/dashboard"); if(r.status===401){ location.href="/login"; return; }
  const d=await r.json();
  document.getElementById("name").textContent=d.user.name||d.user.email;
  document.getElementById("plan").textContent=d.user.plan;
  document.getElementById("sessions").textContent=d.usage.sessions;
  document.getElementById("minutes").textContent=(d.usage.seconds/60).toFixed(1);
  const cap=d.caps||{};
  const perSes=Math.round((cap.session_seconds||0)/60);
  const perDay=Math.round((cap.daily_seconds||0)/60);
  const perMonth=Math.round((cap.monthly_seconds||0)/60);
  const parts=[perSes+" min por sesión"];
  if(perDay>0)parts.push(perDay+" min/día");
  if(perMonth>0)parts.push(perMonth+" min/mes");
  document.getElementById("capdesc").textContent=parts.join(" · ");
  document.getElementById("dlmac").href=d.downloads.mac;
  document.getElementById("dlwin").href=d.downloads.win;
  const rows=d.recent.map(s=>`<tr><td>${new Date(s.started_at*1000).toLocaleString("es")}</td>`+
    `<td>${(s.seconds_used||0).toFixed(0)}s</td><td>$${(s.cost_usd||0).toFixed(3)}</td></tr>`).join("");
  document.getElementById("rows").innerHTML=rows||'<tr><td colspan="3" class="ink-soft">Aún no hay sesiones.</td></tr>';
}
async function upgrade(plan){
  const r=await fetch("/api/billing/checkout",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({plan})});
  if(r.ok){ const d=await r.json(); location.href=d.url; } else { alert("Pagos aún no están configurados."); }
}
async function portal(){
  const r=await fetch("/api/billing/portal",{method:"POST"});
  if(r.ok){ const d=await r.json(); location.href=d.url; } else { alert("Aún no tienes suscripción."); }
}
load();
</script>
</body></html>
