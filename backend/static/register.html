<!doctype html><html lang="es"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Emma — crear cuenta</title>
<meta name="theme-color" content="#0a0a0b">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3CradialGradient id='g' cx='34%25' cy='30%25' r='75%25'%3E%3Cstop offset='0%25' stop-color='%233a3a44'/%3E%3Cstop offset='48%25' stop-color='%2315151b'/%3E%3Cstop offset='100%25' stop-color='%230b0b0f'/%3E%3C/radialGradient%3E%3C/defs%3E%3Ccircle cx='16' cy='16' r='15' fill='url(%23g)'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="/static/tokens.css">
<style>
  .auth{min-height:calc(100vh - 130px);display:flex;align-items:center;justify-content:center;padding:60px 22px}
  .auth .card{width:100%;max-width:400px}
  .auth h1{margin:0 0 8px}
  .auth .lede{color:var(--ink-soft);margin:0 0 26px;font-size:16px}
  .auth .alt{display:flex;align-items:center;justify-content:center;width:100%;margin:10px 0;text-transform:none;letter-spacing:0;font-family:var(--font-body);font-size:15px}
  .auth button.go{width:100%;justify-content:center;margin-top:6px}
  .or{display:flex;align-items:center;gap:14px;margin:22px 0 12px;font-family:var(--font-mono);font-size:12px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em}
  .or::before,.or::after{content:"";flex:1;height:1px;background:var(--rule)}
  .back{margin-top:22px;font-family:var(--font-mono);font-size:12px;letter-spacing:.04em;color:var(--ink-soft)}
</style></head><body>
<nav class="site-nav"><div class="row">
  <a class="brand" href="https://theemmafamily.com"><span class="mk"></span>Emma</a>
</div></nav>
<main class="auth"><div class="card">
  <h1>Crea tu cuenta</h1>
  <p class="lede">Para guardar tu uso y suscribirte a un plan.</p>
  <form id="f" onsubmit="return submit(event)">
    <div class="field"><label for="name">Nombre</label><input id="name" required autocomplete="given-name"></div>
    <div class="field"><label for="email">Email</label><input id="email" type="email" required autocomplete="email" placeholder="tu@email.com"></div>
    <div class="field"><label for="pw">Contraseña</label><input id="pw" type="password" required minlength="8" autocomplete="new-password" placeholder="mínimo 8 caracteres"></div>
    <button id="go" class="btn btn-primary go" type="submit">Crear cuenta</button>
    <div class="form-note err" id="err"></div>
  </form>
  <div class="or">o</div>
  <a class="btn alt" href="/auth/google">Continuar con Google</a>
  <a class="btn alt" href="/auth/github">Continuar con GitHub</a>
  <div class="back">¿Ya tienes cuenta? <a href="/login">Inicia sesión</a> · <a href="https://theemmafamily.com">← Volver</a></div>
</div></main>
<footer class="site-foot"><div class="row">
  <span>hecho por Garcia · Monterrey, MX · 2026</span>
  <span class="links"><a href="https://theemmafamily.com">portada</a><a href="/plans">precios</a><a href="/download">descarga</a></span>
</div></footer>
<script>
const NEXT=(new URLSearchParams(location.search)).get("next")||"/dashboard";
async function submit(ev){
  ev.preventDefault();
  const err=document.getElementById("err"); err.textContent="";
  const btn=document.getElementById("go"); btn.disabled=true; btn.textContent="Creando…";
  try{
    const r=await fetch("/api/auth/register",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        name:document.getElementById("name").value,
        email:document.getElementById("email").value,
        password:document.getElementById("pw").value,
      })});
    if(r.ok){ location.href=NEXT; return false; }
    const d=await r.json().catch(()=>({}));
    err.textContent=d.detail||d.message||"No pude crear la cuenta. Intenta de nuevo.";
  }catch(e){ err.textContent="Sin conexión. Intenta de nuevo."; }
  btn.disabled=false; btn.textContent="Crear cuenta";
  return false;
}
</script>
</body></html>
